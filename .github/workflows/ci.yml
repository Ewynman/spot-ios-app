name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validation:
    name: PR Validation
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for diff comparison
      
      - name: Show Xcode version
        run: xcodebuild -version
      
      - name: Show available SDKs
        run: xcodebuild -showsdks
      
      - name: List available simulators
        run: xcrun simctl list devices available
      
      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      
      - name: Install dependencies
        run: |
          brew install xcbeautify
          brew install jq  # Required for coverage validation
      
      - name: Show available destinations
        run: |
          xcodebuild \
            -scheme SpotTests \
            -showdestinations
      
      - name: Validate API Changes
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking for breaking API changes..."
          ./scripts/validate-api-changes.sh origin/${{ github.base_ref }}
      
      - name: Validate Documentation
        if: github.event_name == 'pull_request'
        run: |
          echo "Validating documentation updates..."
          ./scripts/validate-documentation.sh origin/${{ github.base_ref }}
      
      - name: Run Unit Tests
        id: tests
        run: |
          set -o pipefail
          
          # Run unit tests only (SpotTests scheme)
          # Use any available iOS Simulator
          xcodebuild \
            -scheme SpotTests \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            test | xcbeautify
      
      - name: Validate Code Coverage
        if: github.event_name == 'pull_request'
        run: |
          echo "Validating code coverage on changed files..."
          ./scripts/validate-coverage.sh TestResults.xcresult origin/${{ github.base_ref }} 80
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
      
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/ProfileData
          retention-days: 7
      
      - name: Generate coverage report summary
        if: always()
        run: |
          if [ -d "TestResults.xcresult" ]; then
            echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Extract overall coverage
            xcrun xccov view --report TestResults.xcresult | head -20 >> $GITHUB_STEP_SUMMARY || echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let comment = '## 🤖 PR Validation Results\n\n';
            
            // Check if validation passed
            const conclusion = '${{ steps.tests.outcome }}' === 'success' ? '✅' : '❌';
            comment += `### Tests: ${conclusion}\n\n`;
            
            // Add coverage info note
            comment += '### Coverage\n';
            comment += 'Coverage validation enforces 80% minimum on changed files.\n';
            comment += 'See the [validation logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n';
            
            comment += '---\n';
            comment += '*Automated checks validate tests, coverage, API stability, and documentation.*';
            
            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('PR Validation Results')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
